<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#fff3d8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="한글 이야기책">
  <title>한글 이야기책</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section id="scene-library" class="scene active" aria-labelledby="library-title">
    <header class="library-header">
      <h1 id="library-title">한글 이야기책</h1>
      <p>동물 이름을 찾아 넣으며 읽는 그림 동화책</p>
    </header>
    <main id="book-list" class="book-list" aria-label="책 고르기"></main>
  </section>

  <section id="scene-reader" class="scene" aria-labelledby="reader-title">
    <header class="reader-top">
      <button id="btn-home" class="icon-btn" type="button" aria-label="책장으로">⌂</button>
      <h1 id="reader-title">한글 이야기책</h1>
      <div class="reader-actions">
        <button id="btn-replay" class="icon-btn" type="button" aria-label="다시 듣기">↻</button>
      </div>
    </header>

    <main class="book-stage">
      <div class="book-spread">
        <section class="left-page" aria-label="이야기 지문">
          <div id="story-pages" class="story-pages"></div>
          <div id="choice-tray" class="choice-tray" aria-label="단어 선택지"></div>
        </section>

        <section class="right-page" aria-label="삽화">
          <div id="illustration-frame" class="illustration-frame">
            <img id="main-illustration" alt="" draggable="false">
          </div>
        </section>
      </div>
    </main>

    <div id="complete-panel" class="complete-panel hidden" role="dialog" aria-live="polite">
      <div class="complete-box">
        <p id="complete-title">끝까지 읽었어요!</p>
        <button id="btn-read-again" class="primary-btn" type="button">다시 읽기</button>
        <button id="btn-library" class="secondary-btn" type="button">책장</button>
      </div>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
